<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闽碳途</title>
    <style>
        * {
            padding: 0;
            margin: 0;

        }

        body{
            height: 1500px;

        }
        .shell {
            width: 100%;
            display:flex;
            flex-direction: column;
        }
        header{
            width:100%;
            height:700px;
            overflow: hidden;
            clip-path: polygon(0 0,100% 0%,100% 100%, 100%);
            transition: clip-path 0.5s ease;
        }
        .img{
            width: 100%;
            height: 100%;
            background: url(./bg1.jpg);
            background-size: cover;
            transform: scale(1);
            transition: transform 0.5s ease;
        }
        .main{
            width:100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
            gap: 60px;
            padding: 0 20px;

        }
        .main-left{
            flex: 0 0 40%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main-left img {
            width: 80%;
            object-fit: cover;
        }

        .main-right{
            flex: 0 0 30%;
            text-align: left;
            padding: 0 40px 40px 40px;
        }
        .main-right h2{
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;

        }
        .main-right p{
            font-size: 30px;
            line-height: 2.0;
            color: #333;
        }
        @media(max-width:768px){
            .main{
                flex-direction: column;
                gap: 30px;
                padding: 0 15px;

            }
            .main-left{
                flex:0 0 15px;
            }
            .main-right{
                flex: 0 0 100%;
                text-align: center;
            }
            .main-right h2{
                font-size: 32px;
                margin-bottom: 15px;
            }
            .main-right p{
                font-size: 16px;
                line-height: 1.5;
            }
        }


    </style>
</head>
<body>
    <div class="shell">
        <header>
            <div class="img"></div>
        </header>
        <div class="main">
            <div class = "main-left">
                 <img src="./2.jpg" alt="">
            </div>
            <div class ="main-right">
                <h2>古榕</h2>
                <p>
                    古榕，通常指桑科榕属中树龄悠久，树形巨大的乔木。其特点为枝干常生有气根，落地可成新柱，树冠广阔如伞，寿命长达数百年。</p>
            </div>

        </div>
    </div>
   <h1></h1> 
</body>

<script>

    const header = document.querySelector('header');
    const img = document.querySelector('.img');
    let scrollDistance = 0;
    let requestld = null;
    function updateHeaderClipPath() {
        const clipPathValue = `polygon(0 0,100% 0%,100% ${(scrollDistance <= 600) ? 100 - ((scrollDistance / 600) * 60) : 75}%,0 100%)`;
        header.style.clipPath = clipPathValue;
        const scaleValue = 1 +((scrollDistance / 600) * 1);
        img.style.transform = 'scale(${scaleValue})';
        const opacityValue = (scrollDistance / 600);
    }
    function scrollHandler(event) {
        if(event.deltaY < 0){
            scrollDistance = Math.max(0,scrollDistance + event.deltaY);
        } else{
            scrollDistance = Math.min(600,scrollDistance + event.deltaY);
        }
        if(!requestld) {
            requeetld = window.requestAnimationFrame(() => {
                updateHeaderClipPath();
                requestld = null;
            });
        }
    }
    // 触摸滑动事件（手机/平板）
 let touchStartY = 0;
 function touchStartHandler(event) {
   touchStartY = event.touches[0].clientY;
 }
 function touchMoveHandler(event) {
   const touchY = event.touches[0].clientY;
   const deltaY = touchStartY - touchY; // 向上滑为正
   if(deltaY > 0){
     scrollDistance = Math.min(600, scrollDistance + deltaY);
   } else {
     scrollDistance = Math.max(0, scrollDistance + deltaY);
   }
   touchStartY = touchY;
   if(!requestId) {
     requestId = window.requestAnimationFrame(() => {
       updateHeaderClipPath();
       requestId = null;
     });
   }
 }
 window.addEventListener('wheel', scrollHandler);
 window.addEventListener('touchstart', touchStartHandler);
 window.addEventListener('touchmove', touchMoveHandler);
 </script>
</html>
